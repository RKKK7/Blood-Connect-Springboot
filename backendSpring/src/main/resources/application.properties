spring.application.name=BloodConnect

# ----- HTTP server (REST API). Vite proxies /api here. -----
server.port=${PORT:8080}

# ----- PostgreSQL -----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bloodconnect}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ----- JSON: ISO dates, drop nulls where we build maps ourselves -----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ----- Redis cache -----
# In Docker, REDIS_HOST=redis. Locally, defaults to localhost:6379.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
# Caching is ON by default (redis). To run WITHOUT a Redis server, set CACHE_TYPE=none.
spring.cache.type=${CACHE_TYPE:redis}

# ----- JWT -----
app.jwt.secret=${JWT_SECRET:change_this_to_a_long_random_secret_string_at_least_32_chars}
app.jwt.expiration-ms=604800000

# ----- Admin registration secret -----
app.admin.secret=${ADMIN_SECRET:bloodconnect_admin_2024}

# ----- Frontend URL (for email links + CORS + socket origin) -----
app.client.url=${CLIENT_URL:http://localhost:5173}

# ----- Socket.IO server (separate Netty port; Vite proxies /socket.io here) -----
app.socketio.host=0.0.0.0
app.socketio.port=${SOCKET_PORT:5000}

# ----- Groq AI -----
app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=llama-3.1-8b-instant
app.groq.base-url=https://api.groq.com/openai/v1/chat/completions

# ----- Email (Gmail SMTP). Optional: leave blank to disable sending. -----
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from-name=BloodConnect
