spring.application.name=BloodConnect

server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bloodconnect}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=604800000

app.admin.secret=${ADMIN_SECRET:bloodconnect_admin_2024}

app.client.url=${CLIENT_URL:http://localhost:5173}

app.socketio.host=0.0.0.0
app.socketio.port=${SOCKET_PORT:5000}

app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=llama-3.1-8b-instant
app.groq.base-url=https://api.groq.com/openai/v1/chat/completions

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from-name=BloodConnect